version: "3.9"

services:
  app:
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
